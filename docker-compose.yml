services:
  # 1. Nginx Proxy
  lucid-proxy:
    image: nginx:latest
    container_name: lucid_proxy
    ports:
      - "8001:8001" 
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - lucid-agent-fe
      - lucid-agent-be
    networks:
      - lucid-network

  # 2. AI 에이전트 백엔드 (Python FastAPI)
  lucid-agent-be:
    # 🚀 수정: Python 3.9에서 최신 라이브러리와 호환성이 좋은 3.10으로 업그레이드
    image: python:3.10-slim 
    container_name: lucid_agent_be
    volumes:
      - ./backend:/app
    working_dir: /app
    ports:
      - "8081:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # 🚀 수정: pip 자체를 먼저 업그레이드하여 설치 에러를 방지합니다.
    command: >
      bash -c "pip install --upgrade pip && 
               pip install --no-cache-dir -r requirements.txt && 
               pip install pdfplumber && 
               uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - lucid-network

  # 3. AI 에이전트 프론트엔드 (React Vite)
  lucid-agent-fe:
    image: node:20-slim
    container_name: lucid_agent_fe
    volumes:
      - ./frontend:/app
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true 
      - VITE_WATCH_USE_POLLING=true
    command: sh -c "if [ ! -d 'node_modules' ]; then npm install; fi && npx vite --host 0.0.0.0 --port 5173"
    networks:
      - lucid-network

networks:
  lucid-network:
    driver: bridge