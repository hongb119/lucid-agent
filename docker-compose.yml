version: '3.8'

services:
  # 1. Nginx Proxy (대문 역할)
  lucid-proxy:
    image: nginx:latest
    container_name: lucid_proxy
    ports:
      - "8001:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - lucid-agent-fe
      - lucid-agent-be
    networks:
      - lucid-network

  # 2. AI 에이전트 백엔드 (Python)
  lucid-agent-be:  # 서비스 이름을 컨테이너 이름과 맞췄습니다.
    image: python:3.9-slim
    container_name: lucid_agent_be
    volumes:
      - ./backend:/app
    working_dir: /app
    ports:
      - "8081:8000"  # 외부에서 8081로 접속 가능
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # [중요] 필요한 패키지를 명시적으로 설치
    command: >
      bash -c "pip install fastapi uvicorn mysql-connector-python openai python-dotenv pydub sqlalchemy python-multipart && 
               uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - lucid-network

  # 3. AI 에이전트 프론트엔드 (React)
  lucid-agent-fe:  # 서비스 이름을 컨테이너 이름과 맞췄습니다.
    image: node:20-slim
    container_name: lucid_agent_fe
    volumes:
      - ./frontend:/app
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true 
      - VITE_WATCH_USE_POLLING=true
    command: sh -c "npm install && npx vite --host 0.0.0.0 --port 5173"
    networks:
      - lucid-network

networks:
  lucid-network:
    driver: bridge