# 1. 기존 AI 에이전트 프론트엔드 연결
server {
    listen 80;
    server_name bnlucid.lucid.kr;

    location / {
        proxy_pass http://agent-frontend:3000; # 기존 앱은 3000 유지
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}

# 2. 신규 아이템뱅크 프론트엔드 연결
server {
    listen 80;
    server_name itembank.lucid.kr;

    location / {
        # [수정] 로그에서 확인한 리액트 내부 포트 5173으로 변경!
        proxy_pass http://itembank-frontend:5173; 
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}

# 3. 통합 API 허브 연결 (api.lucid.kr)
server {
    listen 80;
    server_name api.lucid.kr;

    # [추가] 루트 경로 설정: api.lucid.kr/ 접속 시 백엔드의 /로 연결
    location / {
        proxy_pass http://itembank-backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 기존 에이전트 경로 유지
    location /agent/ {
        proxy_pass http://agent-backend:8000/;
    }

    # 아이템뱅크 경로 유지 
    # (이미 FastAPI 내부 라우터에 /itembank가 포함되어 있다면 중복되지 않게 주의)
    location /itembank/ {
        proxy_pass http://itembank-backend:8000/itembank/;
    }
}