# 1. 모든 지점(AI 에이전트) 프론트엔드 통합 연결 (80포트)
server {
    listen 80;
    server_name *.lucidenglish.co.kr;

    location / {
        proxy_pass http://agent-frontend:5173;
        
        # [고도화] 웹소켓(HMR) 및 에이전트 위젯 실시간 연결
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host; 
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_cache_bypass $http_upgrade;
        
        # 연결 유지 (타임아웃 방지)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

# 2. 통합 API 허브 (api.lucidenglish.co.kr)
server {
    listen 80;
    server_name api.lucidenglish.co.kr;

    location / {
        # [중요] 끝에 /를 제거하여 원래 요청 경로를 그대로 백엔드에 배달합니다.
        # 백엔드 컨테이너의 실제 포트(8081)와 서비스명 확인 필수
        proxy_pass http://agent-backend:8081; 
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}