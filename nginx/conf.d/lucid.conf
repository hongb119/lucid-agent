# 🚀 루시드 통합 Nginx (도커 내부용)

server {
    # 1. 아파치(80)가 쏴주는 신호를 8001번에서 대기하며 받습니다.
    listen 8001; 
    server_name *.lucidenglish.co.kr;

    # 2. API 요청 처리 (백엔드 파이썬)
    # 아파치에서 /api로 들어온 건 이쪽으로 보냅니다.
    location /api {
        proxy_pass http://lucid_agent_be:8000; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. 리액트/비트 화면 처리 (프론트엔드)
    # /speaking, /voca 등 모든 화면 요청은 이쪽으로 보냅니다.
    location / {
        proxy_pass http://lucid_agent_fe:5173;
        
        # 웹소켓(HMR) 지원 - 개발 시 화면 자동 갱신에 필수
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 2차 도메인 정보를 그대로 전달 (중요!)
        proxy_set_header Host $host; 
        proxy_set_header X-Real-IP $remote_addr;
        
        proxy_read_timeout 86400s;
    }
}