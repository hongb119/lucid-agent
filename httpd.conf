ServerRoot "/etc/httpd"
Listen 80

# [1] 도커 연결을 위한 프록시 모듈 로드 (IncludeOptional 상단에 위치)
Include conf.modules.d/*.conf
LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_http_module modules/mod_proxy_http.so
# 웹소켓 통신을 위한 모듈 (없다면 추가)
LoadModule proxy_wstunnel_module modules/mod_proxy_wstunnel.so

User apache
Group apache

ServerAdmin root@localhost

<Directory />
    AllowOverride none
    Require all denied
</Directory>

DocumentRoot "/var/www/html"

<Directory "/var/www">
    AllowOverride None
    Require all granted
</Directory>

<Directory "/var/www/html">
    Options Indexes FollowSymLinks
    AllowOverride None
    Require all granted
</Directory>

<IfModule dir_module>
    DirectoryIndex index.html
</IfModule>

<Files ".ht*">
    Require all denied
</Files>

ErrorLog "logs/error_log"
LogLevel warn

<IfModule log_config_module>
    LogFormat "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\"" combined
    LogFormat "%h %l %u %t \"%r\" %>s %b" common
    <IfModule logio_module>
      LogFormat "%h %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\" %I %O" combinedio
    </IfModule>
    CustomLog "logs/access_log" combined
</IfModule>

<IfModule alias_module>
    ScriptAlias /cgi-bin/ "/var/www/cgi-bin/"
</IfModule>

<Directory "/var/www/cgi-bin">
    AllowOverride None
    Options None
    Require all granted
</Directory>

<IfModule mime_module>
    TypesConfig /etc/mime.types
    AddType application/x-compress .Z
    AddType application/x-gzip .gz .tgz
    AddType text/html .shtml
    AddOutputFilter INCLUDES .shtml
</IfModule>

AddDefaultCharset UTF-8

<IfModule mime_magic_module>
    MIMEMagicFile conf/magic
</IfModule>

EnableSendfile on

# ---------------------------------------------------------
# [수정/보강] 모든 VirtualHost 공통 프록시 설정
# ---------------------------------------------------------
ProxyRequests Off
ProxyPreserveHost On

# 1. 웹소켓 지원 (400 Bad Request 해결용)
# @react-refresh 등 실시간 업데이트 기능을 위해 필요합니다.
RewriteEngine On
RewriteCond %{HTTP:Upgrade} =websocket [NC]
RewriteRule /(.*)           ws://localhost:5173/$1 [P,L]

# 1. 백엔드 API 서버 (FastAPI 도커)
ProxyPass /api http://localhost:8081/api
ProxyPassReverse /api http://localhost:8081/api

# 3. 리액트 정적 자원 및 소스 파일 (404 Not Found 해결용)
# main.jsx, @vite/client 등을 도커에서 가져오도록 명시합니다.
ProxyPass /src http://localhost:5173/src
ProxyPassReverse /src http://localhost:5173/src

ProxyPass /@vite http://localhost:5173/@vite
ProxyPassReverse /@vite http://localhost:5173/@vite

ProxyPass /node_modules http://localhost:5173/node_modules
ProxyPassReverse /node_modules http://localhost:5173/node_modules

# 2. 리액트 학습창 화면들 (Vite 도커: 5173포트)
# Route path에 등록된 모든 경로를 아파치에 알려줘야 합니다.

# [신규] 스피킹 관련
ProxyPass /speaking http://localhost:5173/speaking
ProxyPassReverse /speaking http://localhost:5173/speaking

ProxyPass /smalltalk http://localhost:5173/smalltalk
ProxyPassReverse /smalltalk http://localhost:5173/smalltalk

ProxyPass /pattern http://localhost:5173/pattern
ProxyPassReverse /pattern http://localhost:5173/pattern

ProxyPass /patterndrill http://localhost:5173/patterndrill
ProxyPassReverse /patterndrill http://localhost:5173/patterndrill

# [기존] 보카/딕테이션/문장 드릴
ProxyPass /voca http://localhost:5173/voca
ProxyPassReverse /voca http://localhost:5173/voca

ProxyPass /dicta http://localhost:5173/dicta
ProxyPassReverse /dicta http://localhost:5173/dicta

ProxyPass /rvoca http://localhost:5173/rvoca
ProxyPassReverse /rvoca http://localhost:5173/rvoca

ProxyPass /rsentence http://localhost:5173/rsentence
ProxyPassReverse /rsentence http://localhost:5173/rsentence

# 3. 리액트 정적 자원 (반드시 필요)
ProxyPass /assets http://localhost:5173/assets
ProxyPassReverse /assets http://localhost:5173/assets
# ---------------------------------------------------------
# ---------------------------------------------------------

# Supplemental configuration
IncludeOptional conf.d/*.conf

ServerTokens Prod
ServerSignature Off
