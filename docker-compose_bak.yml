services:
  # 1. AI 에이전트 백엔드 (FastAPI)
  agent-backend:
    image: python:3.9-slim
    container_name: lucid_agent_be
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    working_dir: /app
    ports:
      - "8080:8000" 
    environment:
      - DB_HOST=host.docker.internal
      - ALLOWED_HOSTS=bnlucid.lucid.kr,localhost 
    command: >
      bash -c "apt-get update && apt-get install -y ffmpeg && 
               pip install fastapi uvicorn mysql-connector-python openai python-dotenv pydub sqlalchemy python-multipart && 
               uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  # 2. AI 에이전트 프런트엔드 (React / Vite)
  agent-frontend:
    image: node:20-slim
    container_name: lucid_agent_fe
    volumes:
      - ./frontend:/app
    working_dir: /app
    ports:
      - "5173:3000" 
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WDS_SOCKET_PORT=5173
      - VITE_API_URL=http://bnlucid.lucid.kr:8080
    command: sh -c "npm install && npx vite --host 0.0.0.0 --port 3000"
    stdin_open: true
    tty: true